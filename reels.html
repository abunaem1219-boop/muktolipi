<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Reels - মুক্তলিপি</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0;
    padding: 0;
    background-color: #000;
    overflow: hidden;
    height: 100vh;
    font-family: "Inter", "Hind Siliguri", sans-serif;
    color: #fff;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overscroll-behavior: none;
  }

  button { font-family: inherit; }
  img { -webkit-user-drag: none; user-select: none; }

  button:focus-visible,
  .js-profile-link:focus-visible {
    outline: 2px solid #fff;
    outline-offset: 2px;
    border-radius: 8px;
  }

  /* ---------------- Reels container / scroll snap ---------------- */
  .reels-container {
    height: 100vh;
    width: 100vw;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    scrollbar-width: none;
    -ms-overflow-style: none;
    position: relative;
    background: #000;
  }
  .reels-container::-webkit-scrollbar { display: none; }

  .reel-slide {
    height: 100vh;
    width: 100vw;
    scroll-snap-align: start;
    scroll-snap-stop: always;
    position: relative;
    background: #000;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  @media (min-width: 560px) {
    .reel-slide { width: 460px; margin: 0 auto; }
  }

  /* ---------------- Video layers ---------------- */
  .video-wrapper { position: absolute; inset: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
  .bg-blur-video {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; filter: blur(45px) brightness(0.55);
    transform: scale(1.35); z-index: 1; display: none; pointer-events: none;
  }
  .main-video { position: relative; z-index: 2; width: 100%; height: 100%; object-fit: cover; display: block; background: #000; }

  .tap-overlay { position: absolute; inset: 0; z-index: 5; }

  /* ---------------- Double-tap heart ---------------- */
  .heart-anim {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    z-index: 20; font-size: 110px; opacity: 0; pointer-events: none;
  }
  .heart-anim i { color: #ff3040; filter: drop-shadow(0 4px 18px rgba(0, 0, 0, 0.55)); }
  .heart-anim.pop { animation: heartPop 0.85s cubic-bezier(0.17, 0.89, 0.32, 1.49); }
  @keyframes heartPop {
    0%   { transform: translate(-50%, -50%) scale(0);     opacity: 0; }
    22%  { transform: translate(-50%, -50%) scale(1.15);  opacity: 1; }
    40%  { transform: translate(-50%, -50%) scale(0.95);  opacity: 1; }
    75%  { transform: translate(-50%, -50%) scale(1.03);  opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1);     opacity: 0; }
  }

  /* ---------------- Top nav ---------------- */
  .top-nav {
    position: absolute; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: max(14px, env(safe-area-inset-top)) 16px 30px;
    background: linear-gradient(180deg, rgba(0, 0, 0, 0.55) 0%, rgba(0, 0, 0, 0) 100%);
  }
  .top-nav-left { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 19px; cursor: pointer; }
  .top-nav-left i.fa-chevron-left { font-size: 18px; }
  .top-nav-left i.fa-chevron-down { font-size: 12px; opacity: 0.85; margin-top: 2px; }
  .top-nav-right { display: flex; align-items: center; gap: 20px; font-size: 19px; }
  .top-nav-right i { cursor: pointer; }

  /* ---------------- Center controls ---------------- */
  .center-controls {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 6; display: flex; align-items: center; gap: 34px;
    opacity: 0; visibility: hidden; transition: opacity 0.25s ease; pointer-events: none;
  }
  .center-controls.visible { opacity: 1; visibility: visible; pointer-events: auto; }
  .ctrl-btn {
    background: rgba(0, 0, 0, 0.32); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    border: none; color: #fff; width: 52px; height: 52px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer;
  }
  .play-pause-btn { width: 66px; height: 66px; font-size: 26px; }
  .rewind-btn, .forward-btn { font-size: 19px; flex-direction: column; }
  .rewind-btn span, .forward-btn span {
    position: absolute; font-size: 9.5px; font-weight: 700; bottom: 13px; letter-spacing: 0.3px;
  }

  /* ---------------- Right sidebar ---------------- */
  .right-sidebar {
    position: absolute; right: 10px; bottom: 128px; z-index: 10;
    display: flex; flex-direction: column; align-items: center; gap: 21px;
  }
  .sidebar-avatar-wrap {
    width: 46px; height: 46px; border-radius: 50%; padding: 2.5px; cursor: pointer;
    background: linear-gradient(45deg, #ff3040, #ff8a00, #ffd600, #ff3040);
    margin-bottom: 6px;
  }
  .sidebar-avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #000; display: block; }
  .side-btn {
    background: none; border: none; color: #fff; display: flex; flex-direction: column;
    align-items: center; gap: 5px; font-size: 27px; cursor: pointer;
    filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.4));
  }
  .side-btn .count { font-size: 12.5px; font-weight: 600; font-family: "Inter", sans-serif; }
  .like-btn.liked i { color: #ff3040; }
  .save-btn.saved i { color: #ffd60a; }
  .mute-btn { font-size: 23px; margin-top: 4px; }

  /* ---------------- Bottom details ---------------- */
  .bottom-details {
    position: absolute; left: 0; bottom: 70px; z-index: 9; width: 76%;
    padding: 60px 14px 14px 14px;
    background: linear-gradient(0deg, rgba(0, 0, 0, 0.68) 0%, rgba(0, 0, 0, 0.28) 55%, rgba(0, 0, 0, 0) 100%);
  }
  .creator-row { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
  .creator-avatar { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; cursor: pointer; border: 1.5px solid rgba(255, 255, 255, 0.6); flex-shrink: 0; }
  .creator-name {
    font-weight: 700; font-size: 14.5px; cursor: pointer; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; max-width: 150px; font-family: "Inter", "Hind Siliguri", sans-serif;
  }
  .verified-badge { color: #3897f0; font-size: 13px; flex-shrink: 0; }
  .follow-btn {
    margin-left: 6px; background: transparent; border: 1.4px solid rgba(255, 255, 255, 0.85);
    color: #fff; font-size: 12.5px; font-weight: 700; padding: 5px 14px; border-radius: 7px;
    cursor: pointer; flex-shrink: 0; transition: opacity 0.15s ease;
  }
  .follow-btn.following { opacity: 0.6; border-color: rgba(255, 255, 255, 0.5); }
  .music-row { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 9px; overflow: hidden; }
  .music-row > i { flex-shrink: 0; }
  .marquee-wrap {
    overflow: hidden; white-space: nowrap; max-width: 190px;
    -webkit-mask-image: linear-gradient(90deg, transparent, #000 10%, #000 90%, transparent);
    mask-image: linear-gradient(90deg, transparent, #000 10%, #000 90%, transparent);
  }
  .marquee-text { display: inline-block; padding-left: 100%; animation: marquee 9s linear infinite; }
  @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
  .caption-row { font-family: "Hind Siliguri", "Inter", sans-serif; font-size: 14px; line-height: 1.45; }
  .caption-text { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .caption-text.expanded { -webkit-line-clamp: unset; }
  .more-btn { color: rgba(255, 255, 255, 0.72); font-weight: 600; cursor: pointer; margin-left: 4px; font-size: 13px; }

  /* ---------------- Global reply bar ---------------- */
  .global-comment-bar {
    position: fixed; left: 12px; right: 12px; bottom: calc(env(safe-area-inset-bottom, 0px) + 10px);
    z-index: 50; display: flex; align-items: center; gap: 10px;
    background: rgba(38, 38, 38, 0.55); backdrop-filter: blur(14px) saturate(160%); -webkit-backdrop-filter: blur(14px) saturate(160%);
    border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 999px; padding: 8px 8px 8px 16px;
    max-width: 460px; margin: 0 auto;
  }
  @media (min-width: 560px) { .global-comment-bar { left: 50%; right: auto; transform: translateX(-50%); width: 420px; } }
  .global-comment-bar input {
    flex: 1; background: none; border: none; outline: none; color: #fff; font-size: 14px;
    font-family: "Hind Siliguri", "Inter", sans-serif; min-width: 0;
  }
  .global-comment-bar input::placeholder { color: rgba(255, 255, 255, 0.55); }
  .global-bar-send {
    width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    color: #ff3040; font-size: 19px; cursor: pointer; flex-shrink: 0;
  }

  /* ---------------- Loader ---------------- */
  .loader-screen {
    position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 200;
    transition: opacity 0.3s ease; opacity: 1;
  }
  .loader-screen.hide { opacity: 0; pointer-events: none; }
  .loader-spinner {
    width: 42px; height: 42px; border: 3px solid rgba(255, 255, 255, 0.15); border-top-color: #ff3040;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------------- Toast ---------------- */
  .toast {
    position: fixed; left: 50%; bottom: 100px; transform: translateX(-50%) translateY(16px);
    background: rgba(28, 28, 30, 0.94); color: #fff; padding: 10px 18px; border-radius: 10px;
    font-size: 13.5px; z-index: 150; opacity: 0; visibility: hidden; transition: all 0.25s ease;
    font-family: "Hind Siliguri", "Inter", sans-serif; max-width: 80vw; text-align: center;
  }
  .toast.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }

  /* ---------------- Comment bottom sheet ---------------- */
  .comment-sheet-backdrop {
    position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5); z-index: 99;
    opacity: 0; visibility: hidden; transition: opacity 0.25s ease;
  }
  .comment-sheet-backdrop.open { opacity: 1; visibility: visible; }
  .comment-sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 100; margin: 0 auto; max-width: 560px;
    background: #1c1c1e; border-radius: 18px 18px 0 0; max-height: 72vh; height: 72vh;
    display: flex; flex-direction: column; transform: translateY(100%);
    transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1); padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  .comment-sheet.open { transform: translateY(0); }
  .comment-sheet-handle { width: 36px; height: 4px; background: rgba(255, 255, 255, 0.3); border-radius: 3px; margin: 10px auto 6px; }
  .comment-sheet-header {
    display: flex; align-items: center; justify-content: center; position: relative;
    padding: 6px 16px 12px; font-weight: 700; font-size: 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }
  .comment-sheet-header button { position: absolute; right: 12px; top: 0; background: none; border: none; color: #fff; font-size: 18px; cursor: pointer; }
  .comment-list { flex: 1; overflow-y: auto; padding: 12px 16px; -webkit-overflow-scrolling: touch; }
  .comment-item { display: flex; gap: 10px; margin-bottom: 17px; }
  .comment-item img { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
  .comment-item .c-body { font-family: "Hind Siliguri", "Inter", sans-serif; }
  .comment-item .c-name { font-weight: 700; font-size: 13px; margin-right: 6px; }
  .comment-item .c-text { font-size: 13.5px; line-height: 1.4; }
  .comment-item .c-time { font-size: 11px; color: rgba(255, 255, 255, 0.45); margin-top: 3px; }
  .comment-empty { text-align: center; color: rgba(255, 255, 255, 0.4); font-size: 13.5px; margin-top: 40px; font-family: "Hind Siliguri", "Inter", sans-serif; }
  .comment-sheet-input-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-top: 1px solid rgba(255, 255, 255, 0.08); }
  .comment-input-avatar { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
  .comment-sheet-input-row input {
    flex: 1; background: rgba(255, 255, 255, 0.08); border: none; border-radius: 20px; padding: 9px 14px;
    color: #fff; font-size: 13.5px; outline: none; font-family: "Hind Siliguri", "Inter", sans-serif; min-width: 0;
  }
  .comment-sheet-input-row button { background: none; border: none; color: #3897f0; font-size: 19px; cursor: pointer; flex-shrink: 0; }

  @media (prefers-reduced-motion: reduce) {
    .marquee-text { animation: none; }
    .heart-anim.pop { animation: none; }
    * { scroll-behavior: auto !important; }
  }
</style>
</head>
<body>

  <div class="reels-container" id="reelsContainer"></div>

  <div class="global-comment-bar" id="globalCommentBar">
    <input type="text" id="globalBarInput" placeholder="Reply..." autocomplete="off">
    <div class="global-bar-send" id="globalBarSend" role="button" aria-label="Send or like">
      <i class="fa-solid fa-heart" id="globalBarIcon"></i>
    </div>
  </div>

  <div class="comment-sheet-backdrop" id="commentBackdrop"></div>
  <div class="comment-sheet" id="commentSheet">
    <div class="comment-sheet-handle"></div>
    <div class="comment-sheet-header">
      <span id="commentSheetTitle">Comments</span>
      <button id="closeCommentSheet" aria-label="Close comments"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="comment-list" id="commentList"></div>
    <div class="comment-sheet-input-row">
      <img class="comment-input-avatar" id="commentInputAvatar" src="" alt="">
      <input type="text" id="commentInputField" placeholder="একটি মন্তব্য লিখুন..." autocomplete="off">
      <button id="postCommentBtn" aria-label="Post comment"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
  </div>

  <div class="loader-screen" id="loaderScreen"><div class="loader-spinner"></div></div>
  <div class="toast" id="toast"></div>

  <!-- navbar.js is assumed to already exist elsewhere in the Muktolipi project; -->
  <!-- it is included here only for structural consistency with the rest of the site. -->
  <script src="navbar.js" onerror="this.remove()"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import {
      getDatabase, ref, onValue, push, runTransaction
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import {
      getAuth, onAuthStateChanged, signInAnonymously
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    /* =========================================================
       FIREBASE CONFIG
    ========================================================= */
    const firebaseConfig = {
      apiKey: "AIzaSyBZtycgadrngON2WEwvIE7ERPYxdkDVfFM",
      authDomain: "muktolipidiary.firebaseapp.com",
      databaseURL: "https://muktolipidiary-default-rtdb.firebaseio.com",
      projectId: "muktolipidiary",
      storageBucket: "muktolipidiary.firebasestorage.app",
      messagingSenderId: "639103995400",
      appId: "1:639103995400:web:13528e51c0e86080770bbd"
    };

    let db = null;
    let auth = null;
    let currentUser = null;

    try {
      const app = initializeApp(firebaseConfig);
      db = getDatabase(app);
      auth = getAuth(app);
      signInAnonymously(auth).catch((err) => console.warn("Anonymous auth failed:", err && err.message));
      onAuthStateChanged(auth, (user) => { currentUser = user; });
    } catch (e) {
      console.error("Firebase initialization failed:", e);
    }

    /* =========================================================
       HELPERS
    ========================================================= */
    const DEFAULT_AVATAR = "data:image/svg+xml;utf8," + encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100">' +
      '<rect width="100" height="100" fill="#4a4a4a"/>' +
      '<circle cx="50" cy="38" r="18" fill="#8a8a8a"/>' +
      '<ellipse cx="50" cy="88" rx="32" ry="24" fill="#8a8a8a"/>' +
      '</svg>'
    );

    const prefersReducedMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str == null ? "" : String(str);
      return div.innerHTML;
    }

    function formatCount(n) {
      n = Number(n) || 0;
      if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, "") + "M";
      if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, "") + "K";
      return String(n);
    }

    function formatTimeAgo(ts) {
      if (!ts) return "";
      const diffMs = Date.now() - ts;
      const min = Math.floor(diffMs / 60000);
      if (min < 1) return "now";
      if (min < 60) return min + "m";
      const hr = Math.floor(min / 60);
      if (hr < 24) return hr + "h";
      const day = Math.floor(hr / 24);
      if (day < 7) return day + "d";
      return Math.floor(day / 7) + "w";
    }

    /**
     * Rewrites a Cloudinary /upload/ video URL to include automatic format,
     * quality, width and codec transformations for fast mobile playback.
     */
    function optimizeCloudinaryUrl(url) {
      if (!url || typeof url !== "string") return url;
      if (url.includes("/upload/") && !/\/upload\/[^/]*f_auto/.test(url)) {
        return url.replace("/upload/", "/upload/f_auto,q_auto,w_480,vc_vp9/");
      }
      return url;
    }

    /* =========================================================
       MOCK FALLBACK DATA (used only if /reels is empty or unreachable)
    ========================================================= */
    const MOCK_REELS = [
      {
        id: "mock-1",
        videoUrl: "https://res.cloudinary.com/demo/video/upload/dog.mp4",
        creatorName: "Kacchi Bhai - Kutumbari",
        creatorAvatar: DEFAULT_AVATAR,
        creatorUid: "demo-user-1",
        verified: true,
        musicName: "Topu • Meye",
        caption: "মেনশন করুন আপনার ২য় বন্ধুকে যে আপনার সাথে এই কাচ্চি খেতে রাজি হবে! আজকের স্পেশাল কাচ্চি বিরিয়ানি রেসিপি নিয়ে হাজির হলাম আপনাদের জন্য। ঘরে বসেই বানিয়ে ফেলুন একদম রেস্টুরেন্ট স্টাইলে।",
        likeCount: 20,
        commentCount: 19
      },
      {
        id: "mock-2",
        videoUrl: "https://res.cloudinary.com/demo/video/upload/elephants.mp4",
        creatorName: "Muktolipi Diary",
        creatorAvatar: DEFAULT_AVATAR,
        creatorUid: "demo-user-2",
        verified: false,
        musicName: "Original audio - Muktolipi",
        caption: "বাংলার ঐতিহ্যবাহী রান্নার এক অনন্য উপস্থাপনা। ঘরে বসেই তৈরি করুন এই মজাদার খাবার একদম সহজ উপায়ে।",
        likeCount: 452,
        commentCount: 37
      },
      {
        id: "mock-3",
        videoUrl: "https://res.cloudinary.com/demo/video/upload/sea_turtle.mp4",
        creatorName: "Street Food BD",
        creatorAvatar: DEFAULT_AVATAR,
        creatorUid: "demo-user-3",
        verified: true,
        musicName: "Arefin Rumi • Bristi",
        caption: "ঢাকার রাস্তার সেরা স্ট্রিট ফুড খুঁজে বের করলাম আজকে। দেখুন পুরো ভিডিওতে এবং জানিয়ে দিন কমেন্টে!",
        likeCount: 1280,
        commentCount: 210
      }
    ];

    /* =========================================================
       STATE
    ========================================================= */
    const reelsContainer = document.getElementById("reelsContainer");
    const loaderScreen = document.getElementById("loaderScreen");
    const globalBarInput = document.getElementById("globalBarInput");
    const globalBarIcon = document.getElementById("globalBarIcon");
    const globalBarSend = document.getElementById("globalBarSend");

    let isGloballyMuted = true;
    let activeSlideIndex = 0;
    let reelsData = [];
    let observer = null;
    let activeCommentReelId = null;
    let commentsUnsub = null;
    const lastTapAt = new WeakMap();

    /* =========================================================
       RENDER
    ========================================================= */
    function render(reelsArray) {
      reelsData = reelsArray;
      reelsContainer.innerHTML = "";
      const frag = document.createDocumentFragment();
      reelsArray.forEach((reel, idx) => {
        frag.appendChild(createSlideElement(reel, idx));
      });
      reelsContainer.appendChild(frag);
      loaderScreen.classList.add("hide");
      setupIntersectionObserver();
      updateGlobalBar(reelsArray[0]);
    }

    function createSlideElement(reel, idx) {
      const slide = document.createElement("div");
      slide.className = "reel-slide";
      slide.dataset.index = idx;
      slide.dataset.id = reel.id;
      slide.dataset.uid = reel.creatorUid || "";

      const videoUrl = escapeHtml(optimizeCloudinaryUrl(reel.videoUrl));
      const likeCount = reel.likeCount || 0;
      const commentCount = reel.commentCount || (reel.comments ? Object.keys(reel.comments).length : 0);
      const nameSafe = escapeHtml(reel.creatorName || "Unknown Creator");
      const musicSafe = escapeHtml(reel.musicName || "Original audio");
      const captionSafe = escapeHtml(reel.caption || "");
      const avatarSafe = escapeHtml(reel.creatorAvatar || DEFAULT_AVATAR);
      const uidSafe = escapeHtml(reel.creatorUid || "");

      slide.innerHTML =
        '<div class="video-wrapper">' +
          '<video class="bg-blur-video" src="' + videoUrl + '" loop muted playsinline preload="metadata"></video>' +
          '<video class="main-video" src="' + videoUrl + '" loop muted playsinline preload="metadata"></video>' +
        "</div>" +
        '<div class="tap-overlay"></div>' +
        '<div class="heart-anim"><i class="fa-solid fa-heart"></i></div>' +

        '<div class="top-nav">' +
          '<div class="top-nav-left" id="backNav">' +
            '<i class="fa-solid fa-chevron-left"></i>' +
            "<span>Reels</span>" +
            '<i class="fa-solid fa-chevron-down dropdown-arrow"></i>' +
          "</div>" +
          '<div class="top-nav-right">' +
            '<i class="fa-solid fa-magnifying-glass search-icon"></i>' +
            '<i class="fa-solid fa-circle-user profile-icon"></i>' +
          "</div>" +
        "</div>" +

        '<div class="center-controls">' +
          '<button class="ctrl-btn rewind-btn" aria-label="Rewind 5 seconds"><i class="fa-solid fa-rotate-left"></i><span>5</span></button>' +
          '<button class="ctrl-btn play-pause-btn" aria-label="Play or pause"><i class="fa-solid fa-play"></i></button>' +
          '<button class="ctrl-btn forward-btn" aria-label="Forward 5 seconds"><i class="fa-solid fa-rotate-right"></i><span>5</span></button>' +
        "</div>" +

        '<div class="right-sidebar">' +
          '<div class="sidebar-avatar-wrap js-profile-link" data-uid="' + uidSafe + '" tabindex="0" role="link" aria-label="Visit profile">' +
            '<img class="sidebar-avatar" src="' + avatarSafe + '" alt="creator avatar">' +
          "</div>" +
          '<button class="side-btn like-btn" aria-label="Like">' +
            '<i class="fa-regular fa-heart"></i>' +
            '<span class="count like-count" data-raw="' + likeCount + '">' + formatCount(likeCount) + "</span>" +
          "</button>" +
          '<button class="side-btn comment-btn" aria-label="Comments">' +
            '<i class="fa-regular fa-comment"></i>' +
            '<span class="count comment-count" data-raw="' + commentCount + '">' + formatCount(commentCount) + "</span>" +
          "</button>" +
          '<button class="side-btn share-btn" aria-label="Share"><i class="fa-solid fa-share"></i></button>' +
          '<button class="side-btn save-btn" aria-label="Save"><i class="fa-regular fa-bookmark"></i></button>' +
          '<button class="side-btn mute-btn" aria-label="Mute or unmute"><i class="fa-solid fa-volume-xmark"></i></button>' +
        "</div>" +

        '<div class="bottom-details">' +
          '<div class="creator-row">' +
            '<img class="creator-avatar js-profile-link" data-uid="' + uidSafe + '" tabindex="0" role="link" aria-label="Visit profile" src="' + avatarSafe + '" alt="creator avatar">' +
            '<span class="creator-name js-profile-link" data-uid="' + uidSafe + '" tabindex="0" role="link">' + nameSafe + "</span>" +
            (reel.verified ? '<i class="fa-solid fa-circle-check verified-badge" aria-label="Verified"></i>' : "") +
            '<button class="follow-btn">Follow</button>' +
          "</div>" +
          '<div class="music-row">' +
            '<i class="fa-solid fa-music"></i>' +
            '<div class="marquee-wrap"><span class="marquee-text">' + musicSafe + "</span></div>" +
          "</div>" +
          '<div class="caption-row">' +
            '<span class="caption-text">' + captionSafe + "</span>" +
            '<span class="more-btn">more</span>' +
          "</div>" +
        "</div>";

      const mainVideo = slide.querySelector(".main-video");
      const bgVideo = slide.querySelector(".bg-blur-video");
      mainVideo.muted = true;
      bgVideo.muted = true;

      mainVideo.addEventListener("loadedmetadata", () => {
        const isPortrait = mainVideo.videoHeight >= mainVideo.videoWidth;
        if (isPortrait) {
          mainVideo.style.objectFit = "cover";
          bgVideo.style.display = "none";
        } else {
          mainVideo.style.objectFit = "contain";
          bgVideo.style.display = "block";
        }
      });

      requestAnimationFrame(() => {
        const captionText = slide.querySelector(".caption-text");
        const moreBtn = slide.querySelector(".more-btn");
        if (captionText.scrollHeight <= captionText.clientHeight + 2) {
          moreBtn.style.display = "none";
        }
      });

      return slide;
    }

    /* =========================================================
       INTERSECTION OBSERVER - PLAY ONLY THE VISIBLE SLIDE
    ========================================================= */
    function setupIntersectionObserver() {
      if (observer) observer.disconnect();
      observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          const slide = entry.target;
          const mainVideo = slide.querySelector(".main-video");
          const bgVideo = slide.querySelector(".bg-blur-video");
          const playIcon = slide.querySelector(".play-pause-btn i");

          if (entry.intersectionRatio > 0.6) {
            activeSlideIndex = parseInt(slide.dataset.index, 10);
            mainVideo.muted = isGloballyMuted;
            const p1 = mainVideo.play();
            if (p1 && p1.catch) p1.catch(() => {});
            if (bgVideo.style.display !== "none") {
              const p2 = bgVideo.play();
              if (p2 && p2.catch) p2.catch(() => {});
            }
            if (playIcon) { playIcon.classList.remove("fa-play"); playIcon.classList.add("fa-pause"); }
            updateGlobalBar(reelsData[activeSlideIndex]);
          } else {
            mainVideo.pause();
            mainVideo.currentTime = 0;
            bgVideo.pause();
            bgVideo.currentTime = 0;
            if (playIcon) { playIcon.classList.add("fa-play"); playIcon.classList.remove("fa-pause"); }
          }
        });
      }, { root: reelsContainer, threshold: [0, 0.25, 0.5, 0.6, 0.75, 1] });

      document.querySelectorAll(".reel-slide").forEach((slide) => observer.observe(slide));
    }

    /* =========================================================
       INTERACTIONS
    ========================================================= */
    function toggleLike(slide, forceLike) {
      const likeBtn = slide.querySelector(".like-btn");
      const icon = likeBtn.querySelector("i");
      const countEl = likeBtn.querySelector(".like-count");
      const isLiked = likeBtn.classList.contains("liked");
      const shouldLike = forceLike !== undefined ? forceLike : !isLiked;
      if (shouldLike === isLiked) return;

      let count = parseInt(countEl.dataset.raw || "0", 10) || 0;
      count = shouldLike ? count + 1 : Math.max(0, count - 1);
      countEl.textContent = formatCount(count);
      countEl.dataset.raw = String(count);
      likeBtn.classList.toggle("liked", shouldLike);
      icon.classList.toggle("fa-regular", !shouldLike);
      icon.classList.toggle("fa-solid", shouldLike);

      const reelId = slide.dataset.id;
      if (db && reelId && !reelId.startsWith("mock-")) {
        const likeCountRef = ref(db, "reels/" + reelId + "/likeCount");
        runTransaction(likeCountRef, (curr) => (curr || 0) + (shouldLike ? 1 : -1)).catch(() => {});
      }
    }

    function triggerDoubleTapLike(slide) {
      const likeBtn = slide.querySelector(".like-btn");
      if (!likeBtn.classList.contains("liked")) {
        toggleLike(slide, true);
      }
      const heart = slide.querySelector(".heart-anim");
      if (prefersReducedMotion) {
        heart.style.opacity = "1";
        setTimeout(() => { heart.style.opacity = "0"; }, 500);
      } else {
        heart.classList.remove("pop");
        void heart.offsetWidth;
        heart.classList.add("pop");
      }
      if (navigator.vibrate) navigator.vibrate(45);
    }

    function toggleSave(saveBtn) {
      const icon = saveBtn.querySelector("i");
      const saved = saveBtn.classList.toggle("saved");
      icon.classList.toggle("fa-regular", !saved);
      icon.classList.toggle("fa-solid", saved);
      showToast(saved ? "সংগ্রহে সংরক্ষণ করা হয়েছে" : "সংগ্রহ থেকে সরানো হয়েছে");
    }

    function toggleFollow(btn) {
      const following = btn.classList.toggle("following");
      btn.textContent = following ? "Following" : "Follow";
    }

    function handleShare(slide) {
      const reelId = slide.dataset.id;
      const shareUrl = window.location.origin + window.location.pathname + "?reel=" + encodeURIComponent(reelId || "");
      if (navigator.share) {
        navigator.share({ title: "Muktolipi Reels", url: shareUrl }).catch(() => {});
      } else if (navigator.clipboard) {
        navigator.clipboard.writeText(shareUrl)
          .then(() => showToast("লিংক কপি করা হয়েছে"))
          .catch(() => showToast("লিংক কপি করা যায়নি"));
      } else {
        showToast("শেয়ার করা যাচ্ছে না");
      }
    }

    function toggleGlobalMute() {
      isGloballyMuted = !isGloballyMuted;
      document.querySelectorAll("video").forEach((v) => { v.muted = isGloballyMuted; });
      document.querySelectorAll(".mute-btn i").forEach((i) => {
        i.classList.toggle("fa-volume-xmark", isGloballyMuted);
        i.classList.toggle("fa-volume-high", !isGloballyMuted);
      });
    }

    function expandCaption(moreBtn) {
      const captionText = moreBtn.previousElementSibling;
      const nowExpanded = captionText.classList.toggle("expanded");
      moreBtn.textContent = nowExpanded ? "less" : "more";
    }

    function showCenterControlsTemporarily(slide) {
      const controls = slide.querySelector(".center-controls");
      controls.classList.add("visible");
      clearTimeout(controls._hideTimer);
      controls._hideTimer = setTimeout(() => controls.classList.remove("visible"), 2600);
    }

    function toggleCenterControlsVisibility(slide) {
      const controls = slide.querySelector(".center-controls");
      const willShow = !controls.classList.contains("visible");
      controls.classList.toggle("visible", willShow);
      if (willShow) {
        clearTimeout(controls._hideTimer);
        controls._hideTimer = setTimeout(() => controls.classList.remove("visible"), 2600);
      }
    }

    function togglePlayPause(slide) {
      const video = slide.querySelector(".main-video");
      const icon = slide.querySelector(".play-pause-btn i");
      if (video.paused) {
        const p = video.play();
        if (p && p.catch) p.catch(() => {});
        icon.classList.remove("fa-play");
        icon.classList.add("fa-pause");
      } else {
        video.pause();
        icon.classList.remove("fa-pause");
        icon.classList.add("fa-play");
      }
      showCenterControlsTemporarily(slide);
    }

    function seekVideo(slide, delta) {
      const video = slide.querySelector(".main-video");
      const bg = slide.querySelector(".bg-blur-video");
      const duration = isFinite(video.duration) ? video.duration : 1e9;
      video.currentTime = Math.max(0, Math.min(duration, video.currentTime + delta));
      if (bg) bg.currentTime = video.currentTime;
      showCenterControlsTemporarily(slide);
    }

    function handleTapOverlayClick(overlay) {
      const slide = overlay.closest(".reel-slide");
      const now = Date.now();
      const last = lastTapAt.get(overlay) || 0;
      if (now - last < 300) {
        lastTapAt.set(overlay, 0);
        if (overlay._singleTapTimer) { clearTimeout(overlay._singleTapTimer); overlay._singleTapTimer = null; }
        triggerDoubleTapLike(slide);
      } else {
        lastTapAt.set(overlay, now);
        overlay._singleTapTimer = setTimeout(() => {
          toggleCenterControlsVisibility(slide);
        }, 300);
      }
    }

    function showToast(msg) {
      const toast = document.getElementById("toast");
      toast.textContent = msg;
      toast.classList.add("show");
      clearTimeout(toast._t);
      toast._t = setTimeout(() => toast.classList.remove("show"), 2200);
    }

    function goToProfile(uid) {
      window.location.href = "profile.html?uid=" + encodeURIComponent(uid || "");
    }

    /* ---- Single delegated click handler for the whole reels container ---- */
    reelsContainer.addEventListener("click", (e) => {
      const profileEl = e.target.closest(".js-profile-link");
      const followBtn = e.target.closest(".follow-btn");
      const likeBtn = e.target.closest(".like-btn");
      const commentBtn = e.target.closest(".comment-btn");
      const shareBtn = e.target.closest(".share-btn");
      const saveBtn = e.target.closest(".save-btn");
      const muteBtn = e.target.closest(".mute-btn");
      const moreBtn = e.target.closest(".more-btn");
      const playPauseBtn = e.target.closest(".play-pause-btn");
      const rewindBtn = e.target.closest(".rewind-btn");
      const forwardBtn = e.target.closest(".forward-btn");
      const backNav = e.target.closest("#backNav");
      const searchIcon = e.target.closest(".search-icon");
      const profileIcon = e.target.closest(".profile-icon");
      const tapOverlay = e.target.closest(".tap-overlay");

      if (profileEl) { e.stopPropagation(); goToProfile(profileEl.dataset.uid); return; }
      if (followBtn) { e.stopPropagation(); toggleFollow(followBtn); return; }
      if (likeBtn) { e.stopPropagation(); toggleLike(likeBtn.closest(".reel-slide")); return; }
      if (commentBtn) { e.stopPropagation(); openCommentSheet(commentBtn.closest(".reel-slide")); return; }
      if (shareBtn) { e.stopPropagation(); handleShare(shareBtn.closest(".reel-slide")); return; }
      if (saveBtn) { e.stopPropagation(); toggleSave(saveBtn); return; }
      if (muteBtn) { e.stopPropagation(); toggleGlobalMute(); return; }
      if (moreBtn) { e.stopPropagation(); expandCaption(moreBtn); return; }
      if (playPauseBtn) { e.stopPropagation(); togglePlayPause(playPauseBtn.closest(".reel-slide")); return; }
      if (rewindBtn) { e.stopPropagation(); seekVideo(rewindBtn.closest(".reel-slide"), -5); return; }
      if (forwardBtn) { e.stopPropagation(); seekVideo(forwardBtn.closest(".reel-slide"), 5); return; }
      if (backNav) { e.stopPropagation(); window.history.back(); return; }
      if (searchIcon) { e.stopPropagation(); window.location.href = "search.html"; return; }
      if (profileIcon) { e.stopPropagation(); window.location.href = "profile.html"; return; }
      if (tapOverlay) { handleTapOverlayClick(tapOverlay); return; }
    });

    reelsContainer.addEventListener("keydown", (e) => {
      if ((e.key === "Enter" || e.key === " ") && e.target.classList.contains("js-profile-link")) {
        e.preventDefault();
        goToProfile(e.target.dataset.uid);
      }
    });

    /* =========================================================
       GLOBAL REPLY BAR
    ========================================================= */
    function updateGlobalBar(reel) {
      if (!reel) return;
      globalBarInput.placeholder = "Reply to " + (reel.creatorName || "this reel") + "...";
    }

    globalBarInput.addEventListener("input", () => {
      const hasText = globalBarInput.value.trim().length > 0;
      globalBarIcon.classList.toggle("fa-heart", !hasText);
      globalBarIcon.classList.toggle("fa-paper-plane", hasText);
    });

    globalBarInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); globalBarSend.click(); }
    });

    globalBarSend.addEventListener("click", () => {
      const text = globalBarInput.value.trim();
      const activeSlide = reelsContainer.querySelector('.reel-slide[data-index="' + activeSlideIndex + '"]');
      if (!text) {
        if (activeSlide) triggerDoubleTapLike(activeSlide);
        return;
      }
      if (!activeSlide) return;
      const reelId = activeSlide.dataset.id;

      const finishSend = () => {
        globalBarInput.value = "";
        globalBarInput.dispatchEvent(new Event("input"));
      };

      if (!db || !reelId || reelId.startsWith("mock-")) {
        showToast("মন্তব্যটি সংরক্ষিত হয়েছে (ডেমো)");
        finishSend();
        return;
      }
      push(ref(db, "reels/" + reelId + "/comments"), {
        name: (currentUser && currentUser.displayName) || "Guest",
        text: text,
        timestamp: Date.now()
      }).then(() => {
        showToast("মন্তব্য পোস্ট হয়েছে");
        finishSend();
      }).catch(() => showToast("মন্তব্য পাঠাতে ব্যর্থ হয়েছে"));
    });

    /* =========================================================
       COMMENT BOTTOM SHEET
    ========================================================= */
    const commentBackdrop = document.getElementById("commentBackdrop");
    const commentSheet = document.getElementById("commentSheet");
    const commentList = document.getElementById("commentList");
    const commentInputField = document.getElementById("commentInputField");
    const commentInputAvatar = document.getElementById("commentInputAvatar");
    commentInputAvatar.src = DEFAULT_AVATAR;

    function openCommentSheet(slide) {
      const reelId = slide.dataset.id;
      activeCommentReelId = reelId;
      commentBackdrop.classList.add("open");
      commentSheet.classList.add("open");
      commentList.innerHTML = '<div class="comment-empty">লোড হচ্ছে...</div>';

      if (commentsUnsub) { commentsUnsub(); commentsUnsub = null; }

      if (db && reelId && !reelId.startsWith("mock-")) {
        commentsUnsub = onValue(ref(db, "reels/" + reelId + "/comments"), (snap) => {
          renderComments(snap.val());
        }, () => renderComments(null));
      } else {
        renderComments(null);
      }
    }

    function renderComments(data) {
      if (!data) {
        commentList.innerHTML = '<div class="comment-empty">এখনো কোনো মন্তব্য নেই। প্রথম মন্তব্যটি করুন!</div>';
        return;
      }
      const items = Object.values(data).sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
      commentList.innerHTML = items.map((c) => (
        '<div class="comment-item">' +
          '<img src="' + escapeHtml(c.avatar || DEFAULT_AVATAR) + '" alt="">' +
          '<div class="c-body">' +
            '<span class="c-name">' + escapeHtml(c.name || "Guest") + "</span>" +
            '<span class="c-text">' + escapeHtml(c.text || "") + "</span>" +
            '<div class="c-time">' + formatTimeAgo(c.timestamp) + "</div>" +
          "</div>" +
        "</div>"
      )).join("");
      commentList.scrollTop = commentList.scrollHeight;
    }

    function closeCommentSheet() {
      commentBackdrop.classList.remove("open");
      commentSheet.classList.remove("open");
      if (commentsUnsub) { commentsUnsub(); commentsUnsub = null; }
      activeCommentReelId = null;
    }

    function postComment() {
      const text = commentInputField.value.trim();
      if (!text || !activeCommentReelId) return;

      if (!db || activeCommentReelId.startsWith("mock-")) {
        if (commentList.querySelector(".comment-empty")) commentList.innerHTML = "";
        commentList.insertAdjacentHTML("beforeend",
          '<div class="comment-item"><img src="' + DEFAULT_AVATAR + '" alt=""><div class="c-body">' +
          '<span class="c-name">You</span><span class="c-text">' + escapeHtml(text) + '</span>' +
          '<div class="c-time">now</div></div></div>'
        );
        commentInputField.value = "";
        commentList.scrollTop = commentList.scrollHeight;
        return;
      }

      push(ref(db, "reels/" + activeCommentReelId + "/comments"), {
        name: (currentUser && currentUser.displayName) || "Guest",
        text: text,
        timestamp: Date.now()
      }).then(() => { commentInputField.value = ""; }).catch(() => showToast("মন্তব্য পাঠাতে ব্যর্থ হয়েছে"));
    }

    document.getElementById("closeCommentSheet").addEventListener("click", closeCommentSheet);
    commentBackdrop.addEventListener("click", closeCommentSheet);
    document.getElementById("postCommentBtn").addEventListener("click", postComment);
    commentInputField.addEventListener("keydown", (e) => { if (e.key === "Enter") postComment(); });

    /* =========================================================
       DATA FETCH FROM FIREBASE
    ========================================================= */
    if (db) {
      onValue(ref(db, "reels"), (snapshot) => {
        const data = snapshot.val();
        if (data) {
          const arr = Object.keys(data).map((key) => Object.assign({ id: key }, data[key]));
          render(arr);
        } else {
          render(MOCK_REELS);
        }
      }, (error) => {
        console.error("Failed to load reels from Firebase:", error);
        render(MOCK_REELS);
      });
    } else {
      render(MOCK_REELS);
    }
  </script>
</body>
</html>
